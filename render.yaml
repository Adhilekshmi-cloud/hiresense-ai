services:
  - type: web
    name: ai-resume-screener-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python sample_data/generate_samples.py
    startCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEFAULT_MODEL
        value: all-MiniLM-L6-v2
